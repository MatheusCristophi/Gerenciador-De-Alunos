services:
  app-alunos:
    build: .
    ports:
      - "8080:8080"
    environment:
      - POSTGRE_DB_URL=jdbc:db-alunos:5432/banco-de-dados
    depends_on:
      - db-alunos

  db-alunos:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRE_DB_URL}
      - POSTGRES_PASSWORD=${POSTGRE_DB_PASSWORD}
      - POSTGRES_USER=${POSTGRE_DB_PASSWORD}
      - JWT_SECRET={JWT_SECRET}
    ports:
      - "5432:5432"